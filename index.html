<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Voice Transcribe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        h1 {
            text-align: center;
            font-size: 1.3rem;
            color: #1e293b;
            font-weight: 600;
        }
        .voice-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #voiceStatus {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            min-height: 22px;
        }
        #voiceLabel {
            font-size: 0.75rem;
            color: #64748b;
            text-align: right;
            min-height: 14px;
        }
        #resultArea { display: none; flex-direction: column; gap: 12px; }
        #cleanedText {
            width: 100%;
            min-height: 130px;
            padding: 14px;
            font-size: 0.95rem;
            line-height: 1.6;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            resize: vertical;
            font-family: inherit;
            background: white;
            color: #1e293b;
        }
        #cleanedText:focus { outline: 2px solid #2563eb; border-color: transparent; }
        .actions { display: flex; gap: 10px; }
        .actions button {
            flex: 1;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #copyBtn { background: #16a34a; color: white; }
        #copyBtn.copied { background: #166534; }
        #clearBtn { background: #e2e8f0; color: #475569; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Voice Transcribe</h1>
        <div class="voice-row">
            <span id="voiceLabel">Tap mic to start</span>
            <button id="voiceBtn" type="button" aria-label="Record voice"></button>
        </div>
        <div id="voiceStatus"></div>
        <div id="interim"></div>
        <textarea id="cleanedText" style="display:none;" placeholder="Your transcription will appear here..."></textarea>
        <div id="resultArea">
            <div class="actions">
                <button id="copyBtn">Copy</button>
                <button id="clearBtn">Start Over</button>
            </div>
        </div>
    </div>

    <script src="/shared/voice-to-text.js"></script>
    <script>
        const vtt = VoiceToText.init({
            target:  'cleanedText',
            button:  'voiceBtn',
            interim: 'interim',
            status:  'voiceStatus',
            label:   'voiceLabel',
        });

        const resultArea = document.getElementById('resultArea');
        const cleanedText = document.getElementById('cleanedText');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');

        // Show result area once textarea has content
        const observer = new MutationObserver(() => checkResult());
        function checkResult() {
            if (cleanedText.value.trim() && cleanedText.style.display !== 'none') {
                resultArea.style.display = 'flex';
            }
        }
        // Poll for textarea changes (value changes don't fire mutation events)
        setInterval(checkResult, 500);

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(cleanedText.value).then(() => {
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = 'Copy';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        });

        clearBtn.addEventListener('click', () => {
            resultArea.style.display = 'none';
            cleanedText.value = '';
            cleanedText.style.display = 'none';
            document.getElementById('voiceStatus').textContent = '';
        });
    </script>
</body>
</html>
