<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Voice Transcribe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        h1 {
            text-align: center;
            font-size: 1.3rem;
            color: #1e293b;
            font-weight: 600;
        }
        .voice-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #voiceStatus {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            min-height: 22px;
        }
        #voiceLabel {
            font-size: 0.75rem;
            color: #64748b;
            text-align: right;
            min-height: 14px;
        }
        #resultArea { display: none; flex-direction: column; gap: 12px; }
        #cleanedText {
            width: 100%;
            min-height: 130px;
            padding: 14px;
            font-size: 0.95rem;
            line-height: 1.6;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            resize: vertical;
            font-family: inherit;
            background: white;
            color: #1e293b;
        }
        #cleanedText:focus { outline: 2px solid #2563eb; border-color: transparent; }
        .actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #copyBtn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: inherit;
            color: #475569;
            background: transparent;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        #copyBtn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }
        #copyBtn:active { background: #e2e8f0; }
        #copyBtn .icon { display: flex; width: 14px; height: 14px; }
        #copyBtn .icon svg { width: 100%; height: 100%; }
        #copyBtn.copied {
            color: #16a34a;
            border-color: #86efac;
            background: #f0fdf4;
        }
        #clearBtn {
            padding: 4px 0;
            font-size: 0.78rem;
            font-weight: 400;
            font-family: inherit;
            color: #94a3b8;
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        #clearBtn:hover { color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Voice Transcribe</h1>
        <div class="voice-row">
            <span id="voiceLabel">Tap mic to start</span>
            <button id="voiceBtn" type="button" aria-label="Record voice"></button>
        </div>
        <div id="voiceStatus"></div>
        <div id="interim"></div>
        <textarea id="cleanedText" style="display:none;" placeholder="Your transcription will appear here..."></textarea>
        <div id="resultArea">
            <div class="actions">
                <button id="copyBtn">
                    <span class="icon" id="copyIcon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>
                    <span id="copyLabel">Copy</span>
                </button>
                <button id="clearBtn">Start over</button>
            </div>
        </div>
    </div>

    <script src="/shared/voice-to-text.js"></script>
    <script>
        const vtt = VoiceToText.init({
            target:  'cleanedText',
            button:  'voiceBtn',
            interim: 'interim',
            status:  'voiceStatus',
            label:   'voiceLabel',
        });

        const resultArea = document.getElementById('resultArea');
        const cleanedText = document.getElementById('cleanedText');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');

        // Show result area whenever the textarea has content.
        // Value changes don't fire MutationObserver events, so we use a
        // lightweight interval plus an input listener for manual edits.
        function checkResult() {
            const hasContent = cleanedText.value.trim().length > 0;
            resultArea.style.display = hasContent ? 'flex' : 'none';
        }
        setInterval(checkResult, 300);
        cleanedText.addEventListener('input', checkResult);

        const copyIcon = document.getElementById('copyIcon');
        const copyLabel = document.getElementById('copyLabel');
        const clipboardSvg = copyIcon.innerHTML;
        const checkSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(cleanedText.value).then(() => {
                copyIcon.innerHTML = checkSvg;
                copyLabel.textContent = 'Copied';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyIcon.innerHTML = clipboardSvg;
                    copyLabel.textContent = 'Copy';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        });

        clearBtn.addEventListener('click', () => {
            cleanedText.value = '';
            cleanedText.style.display = 'none';
            document.getElementById('voiceStatus').textContent = '';
            checkResult();
        });
    </script>
</body>
</html>
